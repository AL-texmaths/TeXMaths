<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" width="360" height="360">
  <!-- Simple apple drawing (vector) -->
  <rect width="100%" height="100%" fill="none" />
  <!-- body -->
  <ellipse cx="180" cy="200" rx="90" ry="95" fill="#d32f2f" stroke="#1e1e1e" stroke-width="3" />
  <!-- highlight -->
  <path d="M150 170 C155 155, 175 150, 188 165" fill="#ff9aa2" opacity="0.6" stroke="none" />
  <!-- stem -->
  <path d="M180 120 C178 110, 182 100, 176 92" stroke="#6b3e13" stroke-width="6" stroke-linecap="round" fill="none" />
  <!-- leaf -->
  <path d="M205 125 C230 115, 245 105, 225 95 C210 87, 195 105, 205 125" fill="#2e7d32" stroke="#1e1e1e" stroke-width="2" />
</svg>
