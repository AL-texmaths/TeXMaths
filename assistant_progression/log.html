
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<link rel="stylesheet" href="katex.min.css">
<script src="katex.min.js"></script>
<script src="contrib/auto-render.min.js"></script>

<script>
window.onload = function() {
    renderMathInElement(document.body, {
        delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false },
            { left: "\\(", right: "\\)", display: false },
            { left: "\\[", right: "\\]", display: true }
        ]
    });
};
</script>

<style>
body {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: "Latin Modern Roman", serif;
    padding: 20px;
    font-size: 18px;
}

.code {
    color: #007acc;
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 10px;
}

.meta {
    color: #d4d4d4;
    margin-bottom: 20px;
}

.content {
    line-height: 1.6;
}
hr {
    border: none;
    border-top: 1px solid #3c3c3c;
    margin: 20px 0;
}
</style>

</head>

<body>
<div class="code">A1b*</div>

<div class="meta">
<b>Catalogue :</b> Cycle 4 BO 2020<br>
<b>Type :</b> Compétences
</div>

<hr>

<div class="content">Passer d&#x27;une représentation d&#x27;un nombre à une autre</div>
</body>
</html>
